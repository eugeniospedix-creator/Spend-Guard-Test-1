name: spendguard
description: GPS Powered Dream Protection App
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.12.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  geolocator: ^14.0.2
  shared_preferences: ^2.5.3
  flutter_local_notifications: ^19.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/spendguard_logo.png
    - assets/images/spendguard_icon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/spendguard_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
